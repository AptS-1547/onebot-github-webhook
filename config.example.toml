ENV = "production"

# OneBot connection settings
ONEBOT_URL = "ws://localhost:8080/ws"  # or wss:// for secure connection
ONEBOT_PROTOCOL_TYPE = "ws"            # "ws" or "http"
ONEBOT_ACCESS_TOKEN = ""               # Leave empty if not required

# Feishu (Lark) webhook bot targets (optional, can have multiple)
[[FEISHU]]
name = "main"                           # Referenced by SEND_TO_FEISHU in each webhook rule
webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"
secret = ""                             # Leave empty if security signature is not enabled

# GitHub Webhook configurations (supports multiple)
[[GITHUB_WEBHOOK]]
NAME = "example"
REPO = [
  "your-org/your-repo",
  "your-org/*",          # Wildcard: all repos in org
]
BRANCH = [
  "main",
  "master",
  "feature/*",           # Wildcard: all feature branches
]
SECRET = "your-github-webhook-secret"
EVENTS = [
  "push",
  "pull_request",
  "issues",
  "issue_comment",
  "release",
]
SEND_TO_FEISHU = ["main"]              # List of FEISHU names to send to; omit or leave empty to skip

  [[GITHUB_WEBHOOK.ONEBOT]]
  type = "group"
  id = 123456789          # QQ group ID

  [[GITHUB_WEBHOOK.ONEBOT]]
  type = "private"
  id = 987654321          # QQ user ID
